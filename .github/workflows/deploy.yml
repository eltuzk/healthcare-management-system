name: Deploy Backend to VPS

on:
  push:
    branches:
      - main
      - develop
      - ApiIntegrate

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: "target/healthcare-backend-0.0.1-SNAPSHOT.jar"
          target: "/root"
          strip_components: 1

      - name: Restart Backend on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            # Rename Jar if uploaded successfully
            if [ -f "/root/healthcare-backend-0.0.1-SNAPSHOT.jar" ]; then
              mv /root/healthcare-backend-0.0.1-SNAPSHOT.jar /root/healthcare-backend.jar
            fi
            
            # Kill any active process running on port 8080
            fuser -k 8080/tcp || true
            
            # Start the new backend process using nohup
            nohup java -jar /root/healthcare-backend.jar > /root/backend.log 2>&1 &
            
            # Wait 10 seconds for Spring Boot initialization
            sleep 10
            
            # Output status check
            ps aux | grep java
            ss -tulpn | grep 8080
            
            # Show last 50 lines of logs to verify successful start
            tail -n 50 /root/backend.log
